<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Celebration</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    /* Main Card */
    .card{
      text-align:center;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      padding:40px;
      border-radius:25px;
      color:white;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      z-index:10;
      animation:float 3s ease-in-out infinite;
    }

    .card h1{
      font-size:4rem;
      margin-bottom:15px;
      text-shadow:0 0 10px rgba(255,255,255,0.7);
    }

    .card p{
      font-size:1.3rem;
      line-height:1.6;
    }

    .cake{
      font-size:90px;
      margin-bottom:15px;
      animation:bounce 1.5s infinite;
    }

    /* Balloons */
    .balloon{
      position:absolute;
      bottom:-150px;
      width:70px;
      height:90px;
      border-radius:50%;
      animation:rise linear infinite;
    }

    .balloon::before{
      content:"";
      position:absolute;
      width:2px;
      height:90px;
      background:white;
      top:90px;
      left:50%;
    }

    .b1{left:5%; background:#ff4d4d; animation-duration:9s;}
    .b2{left:20%; background:#4da6ff; animation-duration:12s;}
    .b3{left:35%; background:#ffd24d; animation-duration:8s;}
    .b4{left:50%; background:#66ff99; animation-duration:11s;}
    .b5{left:65%; background:#ff66ff; animation-duration:10s;}
    .b6{left:80%; background:#ff944d; animation-duration:13s;}
    .b7{left:92%; background:#66ccff; animation-duration:9s;}

    @keyframes rise{
      0%{
        transform:translateY(0) rotate(0deg);
        opacity:1;
      }
      100%{
        transform:translateY(-130vh) rotate(20deg);
        opacity:0;
      }
    }

    /* Fireworks */
    .firework{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      animation:explode 1.5s infinite;
    }

    .f1{
      top:20%;
      left:25%;
      background:#fff;
      box-shadow:
        0 -60px #ff0,
        0 60px #ff0,
        60px 0 #ff0,
        -60px 0 #ff0,
        45px 45px #ff4d4d,
        -45px -45px #4da6ff,
        45px -45px #66ff99,
        -45px 45px #ff66ff;
      animation-delay:0s;
    }

    .f2{
      top:35%;
      left:70%;
      background:#fff;
      box-shadow:
        0 -70px #fff,
        0 70px #fff,
        70px 0 #fff,
        -70px 0 #fff,
        50px 50px #ffd24d,
        -50px -50px #ff4d4d,
        50px -50px #4da6ff,
        -50px 50px #66ff99;
      animation-delay:0.5s;
    }

    .f3{
      top:60%;
      left:45%;
      background:#fff;
      box-shadow:
        0 -50px #ff66ff,
        0 50px #ff66ff,
        50px 0 #ff66ff,
        -50px 0 #ff66ff,
        35px 35px #fff,
        -35px -35px #ffd24d,
        35px -35px #4da6ff,
        -35px 35px #ff4d4d;
      animation-delay:1s;
    }

    @keyframes explode{
      0%{
        transform:scale(0);
        opacity:1;
      }
      70%{
        transform:scale(1);
        opacity:1;
      }
      100%{
        transform:scale(1.5);
        opacity:0;
      }
    }

    /* Floating animation */
    @keyframes float{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-10px);
      }
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-15px);
      }
    }

    /* Confetti */
    .confetti{
      position:absolute;
      width:10px;
      height:20px;
      background:white;
      top:-20px;
      animation:fall linear infinite;
    }

    @keyframes fall{
      0%{
        transform:translateY(-10vh) rotate(0deg);
      }
      100%{
        transform:translateY(110vh) rotate(720deg);
      }
    }

  </style>
</head>

<body>

  <!-- Balloons -->
  <div class="balloon b1"></div>
  <div class="balloon b2"></div>
  <div class="balloon b3"></div>
  <div class="balloon b4"></div>
  <div class="balloon b5"></div>
  <div class="balloon b6"></div>
  <div class="balloon b7"></div>

  <!-- Fireworks -->
  <div class="firework f1"></div>
  <div class="firework f2"></div>
  <div class="firework f3"></div>

  <!-- Birthday Card -->
  <div class="card">
    <div class="cake">🎂</div>
    <h1>Happy Birthday!</h1>

    <p>
      May your day be filled with happiness,
      laughter, surprises, and endless joy! 🎉
    </p>
  </div>

  <!-- Confetti Script -->
  <script>
    for(let i=0; i<80; i++){
      let confetti = document.createElement("div");
      confetti.classList.add("confetti");

      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
      confetti.style.backgroundColor =
        `hsl(${Math.random()*360},100%,50%)`;

      document.body.appendChild(confetti);
    }
  </script>

</body>
</html>
